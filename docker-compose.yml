services:
  reviewbot:
    build: .
    container_name: reviewbot
    restart: always
    ports:
      - "5000:8000"
    environment:
      - FLASK_SECRET=CHANGE_ME_TO_RANDOM_STRING
      - DATABASE_PATH=/app/data/database.db
    volumes:
      - ./data:/app/data

networks:
  default:
    name: reviewbot-net
