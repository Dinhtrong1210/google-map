services:
  reviewbot:
    build: .
    container_name: reviewbot
    restart: always
    ports:
      - "5000:8000"
    environment:
      - FLASK_SECRET=CHANGE_ME_TO_RANDOM_STRING
      - DATABASE_PATH=/app/data/database.db
      - SEPAY_ACCOUNT_NUMBER=${SEPAY_ACCOUNT_NUMBER:-}
      - SEPAY_BANK_CODE=${SEPAY_BANK_CODE:-MBBank}
      - SEPAY_ACCOUNT_NAME=${SEPAY_ACCOUNT_NAME:-}
      - SEPAY_WEBHOOK_TOKEN=${SEPAY_WEBHOOK_TOKEN:-}
    volumes:
      - ./data:/app/data

networks:
  default:
    name: reviewbot-net
